<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />
    
    <!-- Ayvro App Info -->
    <title>Ayvro - Decision Engine for Your Money</title>
    <meta name="description" content="Ayvro analyzes your financial signals and proposes concrete actions. Smart, minimal, decisive." />
    <meta name="author" content="Ayvro" />
    <meta name="application-name" content="Ayvro" />
    
    <!-- PWA & Mobile -->
    <meta name="theme-color" content="#0F3D3E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ayvro" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Ayvro - Decision Engine for Your Money" />
    <meta property="og:description" content="Ayvro analyzes your financial signals and proposes concrete actions." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ayvro" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ayvro" />
    <meta name="twitter:description" content="Decision Engine for Your Money" />
    <meta name="twitter:image" content="/og-image.png" />

    <style>
      /* Boot splash — shown until React mounts. Avoids white flash on native cold start. */
      #boot-splash {
        position: fixed; inset: 0; z-index: 99999;
        background: #0F3D3E;
        display: flex; align-items: center; justify-content: center;
        transition: opacity 250ms ease-out;
      }
      #boot-splash.hide { opacity: 0; pointer-events: none; }
      #boot-splash .dot {
        width: 10px; height: 10px; border-radius: 9999px;
        background: rgba(255,255,255,0.85);
        animation: bs-pulse 1s ease-in-out infinite;
      }
      @keyframes bs-pulse {
        0%, 100% { transform: scale(0.6); opacity: 0.5; }
        50%      { transform: scale(1);   opacity: 1;   }
      }
    </style>
  </head>

  <body>
    <div id="boot-splash"><div class="dot"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
